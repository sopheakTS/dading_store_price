<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Battambang', 'Times New Roman', 'Noto Sans SC', sans-serif; }
        .category-item.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 6px -1px rgba(249, 115, 22, 0.4); }
        .product-card { transition: all 0.3s ease; }
        .product-card:hover { transform: translateY(-2px); border-color: #fb923c; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden bg-gray-50">

    <header class="bg-white shadow-md p-4 border-b border-orange-100 flex flex-col gap-3">
        <div class="flex justify-between items-center">
            <h1 class="text-lg font-bold text-orange-600 tracking-tight">តារាងតម្លៃបោះដុំនិងលក់រាយ 零售批发价</h1>
            <span id="last-update" class="text-[10px] text-gray-400 italic"></span>
        </div>
        <input type="text" id="search-box" placeholder="ស្វែងរកឈ្មោះ ឬលេខកូដ...​ 搜索名称或代码……" 
               class="w-full p-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-orange-400 bg-white shadow-sm"
               oninput="handleSearch()">
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside id="category-bar" class="w-1/3 md:w-1/5 bg-gray-100/50 border-r border-gray-200 overflow-y-auto p-3">
            <div class="text-[12px] font-bold text-gray-500 mb-3 px-2 uppercase tracking-widest">
                ប្រភេទ
            </div>
            <div id="category-list"></div>
        </aside>

        <main id="app-container" class="flex-1 overflow-y-auto p-4 space-y-3 bg-gray-50">
        </main>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/1iXLoDPlNtwBr-jfIR8Nd73dxarb9kfv5o3r3MCRCqIo/gviz/tq?tqx=out:csv';
        let allData = [];
        let currentCategory = 'ទាំងអស់';

        async function fetchSheetData() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const lines = data.split('\n');
                
                allData = lines.slice(1).filter(line => line.trim() !== "").map(line => {
                    const row = line.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(cell => cell.replace(/^"|"$/g, '').trim());
                    return { 
                        name: row[0] || '',
                        code: row[1] || '',
                        variant: row[2] || '',
                        salePrice: row[3] || '0',
                        category: row[5] || 'ផ្សេងៗ',
                        inStock: row[6] !== '0', // ត្រួតពិនិត្យក្នុងស្តុក
                        priceUpdate: row[7] || '', 
                        newStock: row[8] || '0'
                    };
                });

                renderCategories();
                renderProductList(allData);
            } catch (e) {
                console.error("កំហុសក្នុងការអានទិន្នន័យ:", e);
            }
        }

        function renderCategories() {
            const uniqueCats = [...new Set(allData.map(i => i.category))];
            const categories = ['ទាំងអស់ 全部', 'ទំនិញថ្មី 新货', ...uniqueCats];
            document.getElementById('category-list').innerHTML = categories.map(cat => `
                <button onclick="filter('${cat}', this)" class="category-item w-full text-left px-4 py-2.5 text-sm rounded-xl font-medium text-gray-700 mb-2 transition-all ${cat === 'ទាំងអស់' ? 'active' : ''}">
                    ${cat}
                </button>
            `).join('');
        }

        function filter(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.category-item').forEach(el => el.classList.remove('active'));
            btn.classList.add('active');
            handleSearch();
        }

        function handleSearch() {
            const searchTerm = document.getElementById('search-box').value.toLowerCase();
            const filtered = allData.filter(item => {
                let matchesCategory = (currentCategory === 'ទាំងអស់ 全部') ? true : 
                                     (currentCategory === 'ទំនិញថ្មី 新货') ? (item.newStock === '1') : 
                                     (item.category === currentCategory);
                const matchesSearch = (item.name.toLowerCase().includes(searchTerm) || item.code.toLowerCase().includes(searchTerm));
                return matchesCategory && matchesSearch;
            });
            renderProductList(filtered);
        }

        function renderProductList(items) {
            const container = document.getElementById('app-container');
            container.innerHTML = items.map(item => {
                const isNew = item.newStock === '1';
                const hasPriceUpdate = item.priceUpdate && item.priceUpdate.trim() !== '' && item.priceUpdate !== '0';
                
                return `
                <div class="product-card bg-white p-4 rounded-2xl shadow-sm border border-gray-100 ${!item.inStock ? 'opacity-60 grayscale' : ''}">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex flex-col gap-1">
                            <span class="font-bold text-gray-800 text-[16px]">${item.name}</span>
                            <div class="flex gap-1 flex-wrap">
                                ${isNew ? '<span class="text-[12px] font-bold text-white bg-red-500 px-2 py-0.5 rounded-md shadow-sm">ទំនិញថ្មី 新货</span>' : ''}
                                ${hasPriceUpdate ? '<span class="text-[12px] font-bold text-white bg-blue-500 px-2 py-0.5 rounded-md shadow-sm">តម្លៃថ្មី 新价</span>' : ''}
                                ${!item.inStock ? '<span class="text-[12px] font-bold text-white bg-gray-800 px-2 py-0.5 rounded-md shadow-sm">អស់ស្តុក 没货</span>' : ''}
                            </div>
                        </div>
                        <span class="text-[11px] text-gray-500 font-bold bg-gray-100 px-2 py-1 rounded-lg">${item.code}</span>
                    </div>
                    <div class="text-[13px] text-gray-500 mb-3">${item.variant}</div>
                    <div class="flex justify-between items-center border-t border-gray-100 pt-3">
                        <div class="flex items-center gap-1">
                            <span class="text-gray-400 text-[11px]">លក់រាយ 零售:</span>
                            <span class="text-orange-600 font-bold text-[16px]">${item.salePrice}</span>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
